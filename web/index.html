<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="prototipo_marketplace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>prototipo_marketplace</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    #kira-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0d7e71 0%, #0a5e55 100%);
      color: #ffffff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      z-index: 9999;
    }
    #kira-loader .box {
      text-align: center;
    }
    #kira-loader .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 14px;
      border-radius: 24px;
      background: #ffffff;
      color: #0d7e71;
      display: grid;
      place-items: center;
      font-size: 42px;
      animation: pulse 1.1s ease-in-out infinite alternate;
    }
    #kira-loader .title {
      font-size: 30px;
      font-weight: 800;
      margin: 0;
    }
    #kira-loader .subtitle {
      margin-top: 8px;
      color: #d7fff8;
      font-size: 14px;
    }
    @keyframes pulse {
      from {
        transform: scale(0.96);
      }
      to {
        transform: scale(1.02);
      }
    }
  </style>
  <div id="kira-loader">
    <div class="box">
      <div class="logo">✂</div>
      <p class="title">Kira Marketplace</p>
      <div class="subtitle">Carregando plataforma...</div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('kira-loader');
      if (loader) {
        loader.remove();
      }
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
